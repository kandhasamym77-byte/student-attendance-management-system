<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Attendance Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#2563eb,#7c3aed);
}

.login-card{
width:380px;
background:rgba(255,255,255,0.95);
padding:35px;
border-radius:22px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
text-align:center;
}

.login-card h1{
color:#1e293b;
margin-bottom:10px;
font-size:28px;
}

.login-card p{
color:#64748b;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:1px solid #ddd;
border-radius:12px;
outline:none;
}

input:focus{
border-color:#2563eb;
box-shadow:0 0 0 3px rgba(37,99,235,0.15);
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#2563eb,#7c3aed);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

#errorMsg{
color:#dc2626;
margin-top:15px;
font-weight:600;
}

@media(max-width:450px){
.login-card{
width:90%;
padding:25px;
}
}
</style>
</head>

<body>

<div class="login-card">
<h1>🎓 Attendance System</h1>
<p>Login to manage student attendance</p>

<input type="email" id="email" placeholder="Enter Email">
<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

<p id="errorMsg"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyDFJHqZ50dftcRLHmAFaGXBgz1Tb9KJJR0",
authDomain: "student-attendance-syste-ef6a4.firebaseapp.com",
projectId: "student-attendance-syste-ef6a4",
storageBucket: "student-attendance-syste-ef6a4.firebasestorage.app",
messagingSenderId: "42307086813",
appId: "1:42307086813:web:c71e842d7084bb2dfd2e34",
measurementId: "G-D0N3C4RFR5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){

let email = document.getElementById("email").value.trim();
let password = document.getElementById("password").value.trim();
let errorMsg = document.getElementById("errorMsg");

if(email === "" || password === ""){
errorMsg.innerText = "Please enter email and password";
return;
}

signInWithEmailAndPassword(auth,email,password)
.then(()=>{
localStorage.setItem("isLoggedIn","true");
window.location.href = "dashboard.html";
})
.catch(()=>{
errorMsg.innerText = "Invalid Email or Password";
});

}
</script>

</body>
</html>
